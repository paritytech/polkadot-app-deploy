# Example caller workflow — copy to your repo's .github/workflows/ directory.
# Customize the Build job for your framework, then call the shared deploy workflow.

name: Deploy to Polkadot

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      skip-cache:
        description: 'Force redeploy (skip cache)'
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ github.repository_owner == 'paritytech' && 'parity-default' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ----------------------------------------------------------------
      # Customize for your framework:
      #   Next.js:  npx next build        → output: ./out
      #   Vite:     npx vite build         → output: ./dist
      #   Plain:    skip build, upload repo root or subdirectory
      # ----------------------------------------------------------------
      - run: npm ci
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ./dist

  deploy:
    needs: build
    uses: paritytech/polkadot-app-deploy/.github/workflows/deploy.yml@main
    with:
      artifact-name: build-output
      dotns-domain: ${{ github.event.repository.name }}-${{ github.head_ref || github.ref_name }}00.dot
      skip-cache: ${{ inputs.skip-cache || false }}
      comment-on-pr: true
      max-retries: 3
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}
      sentry-dsn: ${{ secrets.SENTRY_DSN }}
