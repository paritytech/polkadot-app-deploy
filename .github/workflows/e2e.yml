          max_attempts: 2
          retry_wait_seconds: 30
          retry_on_exit_code: 75
          command: node tools/release-retry-wrapper.mjs node --test test/e2e.test.js

  nightly-s-reprove:
    name: Nightly S-REPROVE auto-reprove stale alias (${{ matrix.env }})
    # Verifies the auto-reprove path introduced in PR #416: when
    # classifyAliasAccountState() returns "bound-likely-stale", preflight()
    # should call reprove() automatically and continue. The test uses the
    # __setClassifyOverrideForTest() seam so no real stale account is required;
    # a dedicated E2E_REPROVE_MNEMONIC account must exist with sufficient balance.
    # Note: the E2E_REPROVE_MNEMONIC fixture account must be provisioned per env;
    # if not provisioned on an env the test will fail (not silently skip).
    needs: [build-nightly, select-env]
    if: always() && needs.build-nightly.result == 'success' && (github.event_name == 'schedule' || github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.test-suite == 'nightly'))
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # env fans out on schedule, single-env on release/dispatch (see select-env).
        env: ${{ fromJSON(needs.select-env.outputs.healthy_envs) }}
    env:
      DEPLOY_TAG: ${{ needs.build-nightly.outputs.deploy-tag }}
      BULLETIN_DEPLOY_VERSION: ${{ needs.build-nightly.outputs.test-version }}
      BULLETIN_DEPLOY_REF: ${{ needs.build-nightly.outputs.polkadot-app-deploy-ref }}
      MNEMONIC: ${{ secrets.DOTNS_MNEMONIC || 'bottom drive obey lake curtain smoke basket hold race lonely fit walk' }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: paritytech/polkadot-app-deploy
          ref: ${{ env.BULLETIN_DEPLOY_REF || '' }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Build polkadot-app-deploy from source
        run: |
          SKIP_ENVIRONMENTS_PREFETCH=1 npm ci
      - name: Run S-REPROVE auto-reprove scenario (one retry on transient testnet failures)
        uses: nick-fields/retry@v3
        env:
          E2E: "1"
          PAD_ENV: ${{ matrix.env }}
          E2E_REPROVE_MNEMONIC: ${{ secrets.E2E_REPROVE_MNEMONIC }}
        with:
          timeout_minutes: 20
          max_attempts: 2
          retry_wait_seconds: 30
          retry_on_exit_code: 75
          command: node tools/release-retry-wrapper.mjs node --test test/e2e-reprove.test.js

  nightly-s-car:
    name: Nightly S-CAR --input-car deploy from pre-built CAR (${{ matrix.env }})
    # Runs after nightly-s1-pool since it deploys a fresh per-run domain
    # (no conflict with e2epoolns01.dot), but we still wait so the pool mnemonic
    # isn't racing S1's Asset Hub transactions.
    needs: [build-nightly, nightly-s1-pool, select-env]
    if: always() && needs.build-nightly.result == 'success' && (github.event_name == 'schedule' || github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.test-suite == 'nightly'))
    # Two consecutive deploys (normal + --input-car) to a fresh per-run label.
    # Runs on both paths: source-build uses node --test test/e2e.test.js;
    # npm-install path writes an inline script so test/ is not required.
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # env fans out on schedule, single-env on release/dispatch (see select-env).
        env: ${{ fromJSON(needs.select-env.outputs.healthy_envs) }}
    env:
      DEPLOY_TAG: ${{ needs.build-nightly.outputs.deploy-tag }}
      BULLETIN_DEPLOY_VERSION: ${{ needs.build-nightly.outputs.test-version }}
      BULLETIN_DEPLOY_REF: ${{ needs.build-nightly.outputs.polkadot-app-deploy-ref }}
      MNEMONIC: ${{ secrets.DOTNS_MNEMONIC || 'bottom drive obey lake curtain smoke basket hold race lonely fit walk' }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      # ---- source-build path (schedule / dispatch without version) ----------
      - name: Checkout polkadot-app-deploy source
        if: env.BULLETIN_DEPLOY_REF != ''
        uses: actions/checkout@v6
        with:
          repository: paritytech/polkadot-app-deploy
          ref: ${{ env.BULLETIN_DEPLOY_REF }}
          path: polkadot-app-deploy-src
      - name: Build polkadot-app-deploy from source
        if: env.BULLETIN_DEPLOY_REF != ''
        run: cd polkadot-app-deploy-src && npm ci
      - name: Run S-CAR --input-car scenario (source-build path, one retry on transient testnet failures)
        if: env.BULLETIN_DEPLOY_REF != ''
        uses: nick-fields/retry@v3
        env:
          E2E: "1"
          E2E_SCENARIO: s-car
          E2E_SIGNER: pool
          E2E_MERKLE: js
          PAD_ENV: ${{ matrix.env }}
          # x00 forces NoStatus classification on both e2eEligible envs without
          # depending on POP_RULES self-attestation.
          LABEL: e2escar${{ github.run_id }}a${{ github.run_attempt }}x00.dot
        with:
          timeout_minutes: 40
          max_attempts: 2
          retry_wait_seconds: 30
          retry_on_exit_code: 75
          command: cd polkadot-app-deploy-src && node tools/release-retry-wrapper.mjs node --test test/e2e.test.js

      # ---- npm-install path (release / dispatch with explicit version) ------
      # Installs polkadot-app-deploy locally (not globally) so the CLI binary is
      # available at node_modules/.bin/polkadot-app-deploy and the script can be
      # placed in the same dir to resolve transitive deps.
      - name: Install polkadot-app-deploy from npm (S-CAR)
        if: env.BULLETIN_DEPLOY_REF == ''
        run: |
          V="${BULLETIN_DEPLOY_VERSION:-latest}"
          echo "Installing @parity/polkadot-app-deploy@$V into /tmp/bd-s-car"
          mkdir -p /tmp/bd-s-car
          echo '{"type":"module"}' > /tmp/bd-s-car/package.json
          cd /tmp/bd-s-car && npm install "@parity/polkadot-app-deploy@${V}"
      - name: Write S-CAR inline test script
        if: env.BULLETIN_DEPLOY_REF == ''
        run: |
          # Write to a file so Node.js resolves 'polkadot-app-deploy' from
          # /tmp/bd-s-car/node_modules (script location = module root).
          # Using a file rather than piped inline code avoids shell-escape
          # hazards (!= etc).
          cat > /tmp/bd-s-car/run-s-car.mjs << 'SCRIPT'
          import path from "path";
          import fs from "fs";
          import { spawnSync } from "child_process";
          import { fileURLToPath } from "url";

          const __dirname = path.dirname(fileURLToPath(import.meta.url));
          const BIN = path.join(__dirname, "node_modules", ".bin", "polkadot-app-deploy");

          const PAD_ENV = process.env.PAD_ENV ?? process.env.DOTNS_ENV ?? "paseo-next-v2";
          const LABEL = process.env.LABEL || "e2escar00default.dot";
          const MNEMONIC = process.env.MNEMONIC || "bottom drive obey lake curtain smoke basket hold race lonely fit walk";
          const DEPLOY_TAG = process.env.DEPLOY_TAG || undefined;
          const SENTRY_DSN = process.env.SENTRY_DSN || undefined;
          const CAR_PATH = "/tmp/s-car-npm.car";

          // Create a minimal fixture directory for the first deploy.
          const FIXTURE = "/tmp/s-car-fixture";
          fs.rmSync(FIXTURE, { recursive: true, force: true });
          fs.mkdirSync(FIXTURE, { recursive: true });
          fs.writeFileSync(
            path.join(FIXTURE, "index.html"),
            `<html><body>s-car e2e ${Date.now()}</body></html>`,
          );

          function parseCid(stdout) {
            for (const line of stdout.trim().split("\n").reverse()) {
              const m = line.match(/^CID:\s+(bafy\S+)/);
              if (m) return m[1];
            }
            throw new Error(`Could not parse CID from output. Tail: ${stdout.slice(-500)}`);
          }

          function run(args, extraEnv = {}) {
            const env = {
              ...process.env,
              PAD_ENV,
              ...(DEPLOY_TAG ? { DEPLOY_TAG } : {}),
              ...(SENTRY_DSN ? { SENTRY_DSN } : {}),
              ...extraEnv,
            };
            const r = spawnSync("node", [BIN, ...args], { encoding: "utf8", env, timeout: 35 * 60 * 1000 });
            return { code: r.status ?? 1, stdout: r.stdout ?? "", stderr: r.stderr ?? "" };
          }

          console.log("[S-CAR npm] Step 1: normal deploy + CAR dump");
          const r1 = run(
            [FIXTURE, LABEL, "--js-merkle", "--env", PAD_ENV, "--mnemonic", MNEMONIC],
            { PAD_DUMP_CAR: CAR_PATH },
          );
          process.stdout.write(r1.stdout);
          process.stderr.write(r1.stderr);
          if (r1.code !== 0) throw new Error(`[S-CAR npm] first deploy failed (exit ${r1.code})`);
          if (!fs.existsSync(CAR_PATH)) throw new Error(`[S-CAR npm] PAD_DUMP_CAR did not write ${CAR_PATH}`);
          const cid1 = parseCid(r1.stdout);
          console.log(`[S-CAR npm] cid1 = ${cid1}`);

          console.log("[S-CAR npm] Step 2: --input-car redeploy");
          const r2 = run(
            ["--input-car", CAR_PATH, LABEL, "--env", PAD_ENV, "--mnemonic", MNEMONIC],
          );
          process.stdout.write(r2.stdout);
          process.stderr.write(r2.stderr);
          if (r2.code !== 0) throw new Error(`[S-CAR npm] --input-car deploy failed (exit ${r2.code}). Stderr: ${r2.stderr.slice(-500)}`);
          const cid2 = parseCid(r2.stdout);
          console.log(`[S-CAR npm] cid2 = ${cid2}`);

          if (cid1 !== cid2) {
            throw new Error(`[S-CAR npm] CID mismatch: first=${cid1} second=${cid2}`);
          }
          console.log("[S-CAR npm] PASS: --input-car CID matches normal deploy CID");

          // Cleanup
          fs.rmSync(FIXTURE, { recursive: true, force: true });
          fs.rmSync(CAR_PATH, { force: true });
          SCRIPT
      - name: Run S-CAR --input-car scenario (npm-install path, one retry on transient testnet failures)
        if: env.BULLETIN_DEPLOY_REF == ''
        uses: nick-fields/retry@v3
        env:
          PAD_ENV: ${{ matrix.env }}
          # x00 forces NoStatus classification on both e2eEligible envs without
          # depending on POP_RULES self-attestation.
          LABEL: e2escar${{ github.run_id }}a${{ github.run_attempt }}x00.dot
        with:
          timeout_minutes: 38
          max_attempts: 2
          retry_wait_seconds: 30
          command: node /tmp/bd-s-car/run-s-car.mjs

  nightly-s-inc:
    name: Nightly S-INC ${{ matrix.scenario }} / ${{ matrix.merkle }}
    # Waits for nightly-s1-pool (shares Alice/pool mnemonic) and nightly-s-car
    # (further serializes Alice pool nonces in the third Alice-root deploy chain).
    # max-parallel: 1 serializes the 5 matrix legs against each other since all
    # legs deploy to the same stable pool labels (e2einc.dot / e2erot.dot or
    # e2eincpool01.dot / e2erotpool01.dot) — concurrent legs would collide.
    needs: [build-nightly, nightly-s1-pool, nightly-s-car, select-env]
    if: always() && needs.build-nightly.result == 'success' && (github.event_name == 'schedule' || github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.test-suite == 'nightly'))
    # Only runs from source (BULLETIN_DEPLOY_REF path); npm-install path does
    # not carry test/e2e.test.js so the run step is skipped.
    # Short-term scope: source-build path only (issue #349 defers npm-install rewrite).
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    # s-inc-asset-rotation deploys a 9.6 MB site; needs more headroom than S-CAR's 45 min.
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        # No env fan-out here: S-INC uses include-based matrix and mixing a free
        # env dimension with include produces additive (not cartesian) expansion —
        # GitHub appends include entries without matching env keys rather than
        # merging them. Single-env (selected_env) avoids that trap.
        include:
          - { scenario: s-inc, merkle: js }
          - { scenario: s-inc, merkle: kubo }
          - { scenario: s-inc-roundtrip, merkle: js }
          - { scenario: s-inc-portability, merkle: js }
          - { scenario: s-inc-asset-rotation, merkle: js }
    env:
      DEPLOY_TAG: ${{ needs.build-nightly.outputs.deploy-tag }}
      BULLETIN_DEPLOY_VERSION: ${{ needs.build-nightly.outputs.test-version }}
      BULLETIN_DEPLOY_REF: ${{ needs.build-nightly.outputs.polkadot-app-deploy-ref }}
      MNEMONIC: ${{ secrets.DOTNS_MNEMONIC || 'bottom drive obey lake curtain smoke basket hold race lonely fit walk' }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Checkout polkadot-app-deploy source
        if: env.BULLETIN_DEPLOY_REF != ''
        uses: actions/checkout@v6
        with:
          repository: paritytech/polkadot-app-deploy
          ref: ${{ env.BULLETIN_DEPLOY_REF }}
          path: polkadot-app-deploy-src
      - name: Build polkadot-app-deploy from source
        if: env.BULLETIN_DEPLOY_REF != ''
        run: cd polkadot-app-deploy-src && npm ci
      - name: Run S-INC scenario (one retry on transient testnet failures)
        if: env.BULLETIN_DEPLOY_REF != ''
        uses: nick-fields/retry@v3
        env:
          E2E: "1"
          E2E_SCENARIO: ${{ matrix.scenario }}
          E2E_SIGNER: pool
          E2E_MERKLE: ${{ matrix.merkle }}
          PAD_ENV: ${{ needs.select-env.outputs.selected_env }}
          # S-INC scenarios pick their own stable pool labels via pickIncLabel() /
          # pickRotLabel() in test/e2e.test.js — no LABEL env var needed.
        with:
          timeout_minutes: 55
          max_attempts: 2
          retry_wait_seconds: 30
          retry_on_exit_code: 75
          command: cd polkadot-app-deploy-src && node tools/release-retry-wrapper.mjs node --test test/e2e.test.js

  nightly-s-ext-signer:
    name: Nightly S-ext-signer external PolkadotSigner → in-process Revive (${{ matrix.env }})
    # Last in the Alice-root DotNS chain: s1-pool → s5 → s6 → s4 → s-ext-signer.
    # All these jobs deploy e2epoolns01.dot (Alice root); running any two concurrently
    # causes Stale tx errors from nonce collisions.
    needs: [build-nightly, nightly-s1-pool, nightly-s1-direct, nightly-s6, nightly-s4, select-env]
    if: always() && needs.build-nightly.result == 'success' && (github.event_name == 'schedule' || github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.test-suite == 'nightly'))
    # Verifies the in-process Revive transaction path restored by PR #237.
    # playground-cli uses this path when the user authenticates with a phone
    # signer: it passes a PolkadotSigner object to DotNS.connect() instead of
    # a mnemonic. This test calls DotNS directly via the exported module API
    # so the injected signer reaches the in-process Revive path.
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # env fans out on schedule, single-env on release/dispatch (see select-env).
        env: ${{ fromJSON(needs.select-env.outputs.healthy_envs) }}
    env:
      DEPLOY_TAG: ${{ needs.build-nightly.outputs.deploy-tag }}
      BULLETIN_DEPLOY_VERSION: ${{ needs.build-nightly.outputs.test-version }}
      BULLETIN_DEPLOY_REF: ${{ needs.build-nightly.outputs.polkadot-app-deploy-ref }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      # ---- source-build path (schedule / dispatch without version) ----------
      - name: Checkout polkadot-app-deploy source
        if: env.BULLETIN_DEPLOY_REF != ''
        uses: actions/checkout@v6
        with:
          repository: paritytech/polkadot-app-deploy
          ref: ${{ env.BULLETIN_DEPLOY_REF }}
          path: polkadot-app-deploy-src
      - name: Build polkadot-app-deploy from source
        if: env.BULLETIN_DEPLOY_REF != ''
        run: cd polkadot-app-deploy-src && npm ci
      - name: Run external signer test (source build, one retry on transient testnet failures)
        if: env.BULLETIN_DEPLOY_REF != ''
        uses: nick-fields/retry@v3
        env:
          # 512 MB cap scoped to the test step: exercises polkadot-app-deploy CLI
          # memory-pressure behaviour. At job-level it leaks into npm ci's
          # prepare hook (see PR #408).
          NODE_OPTIONS: --max-old-space-size=512
          E2E: "1"
          E2E_SCENARIO: s7
          E2E_MERKLE: js
          PAD_ENV: ${{ matrix.env }}
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_wait_seconds: 30
          retry_on_exit_code: 75
          command: cd polkadot-app-deploy-src && node tools/release-retry-wrapper.mjs node --test test/e2e.test.js

      # ---- npm-install path (release / dispatch with explicit version) ------
      # Installs polkadot-app-deploy locally (not globally) so all transitive deps
      # — @polkadot/keyring, polkadot-api, multiformats — land in ./node_modules
      # where the test script can resolve them.
      - name: Install polkadot-app-deploy from npm with polkadot deps
        if: env.BULLETIN_DEPLOY_REF == ''
        run: |
          V="${BULLETIN_DEPLOY_VERSION:-latest}"
          echo "Installing @parity/polkadot-app-deploy@$V into /tmp/bd-s-ext"
          mkdir -p /tmp/bd-s-ext
          echo '{"type":"module"}' > /tmp/bd-s-ext/package.json
          cd /tmp/bd-s-ext && npm install "@parity/polkadot-app-deploy@${V}" @polkadot/keyring polkadot-api
      - name: Write external signer test script
        if: env.BULLETIN_DEPLOY_REF == ''
        run: |
          # Write to a file so Node.js resolves 'polkadot-app-deploy' / '@polkadot/keyring' /
          # 'polkadot-api' from /tmp/bd-s-ext/node_modules (script location = module root).
          # Using a file rather than piped inline code avoids shell-escape hazards (!=, etc).
          cat > /tmp/bd-s-ext/run-s-ext.mjs << 'SCRIPT'
          import { DotNS, loadEnvironments, resolveEndpoints } from "@parity/polkadot-app-deploy";
          import { Keyring } from "@polkadot/keyring";
          import { cryptoWaitReady } from "@polkadot/util-crypto";
          import { getPolkadotSigner } from "polkadot-api/signer";
          import { CID } from "multiformats/cid";
          import { base32 } from "multiformats/bases/base32";
          import { base58btc } from "multiformats/bases/base58";

          const PAD_ENV = process.env.PAD_ENV ?? process.env.DOTNS_ENV ?? "paseo-next-v2";

          function encodeContenthash(cidString) {
            const decoder = cidString.startsWith("Qm") ? base58btc : base32;
            const cid = CID.parse(cidString, decoder);
            const bytes = new Uint8Array(cid.bytes.length + 2);
            bytes[0] = 0xe3; bytes[1] = 0x01;
            bytes.set(cid.bytes, 2);
            return Buffer.from(bytes).toString("hex");
          }

          async function resolveDotnsConnectOptions(envId) {
            const { doc } = await loadEnvironments();
            const resolved = resolveEndpoints(doc, envId);
            return {
              rpc: resolved.assetHub[0],
              assetHubEndpoints: resolved.assetHub,
              autoAccountMapping: resolved.autoAccountMapping,
              contracts: resolved.contracts,
              nativeToEthRatio: resolved.nativeToEthRatio,
            };
          }

          const ALICE_MNEMONIC = "bottom drive obey lake curtain smoke basket hold race lonely fit walk";
          const testCid = "bafybeigdyrzt5sfp7udm7hu76uh7y26nf3efuylqabf3oclgtqy55fbzdi";
          const expected = ("0x" + encodeContenthash(testCid)).toLowerCase();

          await cryptoWaitReady();
          const keyring = new Keyring({ type: "sr25519" });
          const account = keyring.addFromMnemonic(ALICE_MNEMONIC);
          const polkadotSigner = getPolkadotSigner(
            account.publicKey, "Sr25519", async (input) => account.sign(input),
          );

          console.log(`[S-ext-signer] Connecting as ${account.address} via external signer...`);
          const dotns = new DotNS();
          try {
            await dotns.connect({ signer: polkadotSigner, signerAddress: account.address, ...await resolveDotnsConnectOptions(PAD_ENV) });
            await dotns.setContenthash("e2epoolns01", expected);
            console.log("[S-ext-signer] setContenthash via external signer verified on-chain");
          } finally {
            dotns.disconnect();
          }
          SCRIPT
      - name: Run external signer test (npm install)
        if: env.BULLETIN_DEPLOY_REF == ''
        timeout-minutes: 15
        working-directory: /tmp/bd-s-ext
        env:
          # 512 MB cap scoped to the test step: exercises polkadot-app-deploy CLI
          # memory-pressure behaviour. At job-level it leaks into npm ci's
          # prepare hook (see PR #408).
          NODE_OPTIONS: --max-old-space-size=512
          PAD_ENV: ${{ matrix.env }}
        run: node run-s-ext.mjs

  nightly-report:
    name: Nightly E2E Report
    needs: [build-nightly, select-env, nightly-s1-pool, nightly-s1-direct, nightly-s2-fresh, nightly-s3, nightly-s4, nightly-verify-s4, nightly-s5, nightly-s6, nightly-s7, nightly-s8, nightly-s9, nightly-s-grandpa-reupload, nightly-s-mortality, nightly-s-reprove, nightly-s-car, nightly-s-inc, nightly-s-ext-signer, nightly-verify-telemetry, nightly-verify-pool-distribution, nightly-pr-coverage, nightly-code-path-coverage]
    if: always() && (github.event_name == 'schedule' || github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.test-suite == 'nightly'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # actions:read — needed for GET /runs/{id}/jobs (fetch per-leg results)
      actions: read
      # issues:write — needed to open failure issues on schedule/release triggers
      issues: write
    steps:
      - name: Fetch per-leg job results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Same robustness fix as pr-report: use curl + pipefail so a
        # missing-gh-binary regression on the runner can't silently
        # produce empty TSVs and a headerless report.
        shell: /usr/bin/bash -euo pipefail {0}
        run: |
          # Fetch up to 200 jobs (two pages) to cover the expanded matrix
          # when healthy_envs has 2+ entries and every scenario fans out.
          curl -fsSL \
            -H "Authorization: bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100&page=1" \
            > /tmp/jobs-p1.json
          curl -fsSL \
            -H "Authorization: bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100&page=2" \
            > /tmp/jobs-p2.json
          jq -s '.[0].jobs + .[1].jobs | {jobs: .}' /tmp/jobs-p1.json /tmp/jobs-p2.json > /tmp/jobs.json
          jq -r '.jobs[] | select(.name | startswith("Nightly S1 ")) | "\(.name)\t\(.conclusion)"' \
            /tmp/jobs.json > /tmp/s1-legs.tsv
          jq -r '.jobs[] | select(.name | startswith("Nightly S2 fresh ")) | "\(.name)\t\(.conclusion)"' \
            /tmp/jobs.json > /tmp/s2-legs.tsv
          # Per-env breakdown: group any "Nightly …" jobs by the env suffix in parentheses.
          jq -r '.jobs[] | select(.name | test("^Nightly ")) | "\(.name)\t\(.conclusion)"' \
            /tmp/jobs.json > /tmp/all-nightly-legs.tsv

      - name: Render report body
        env:
          NIGHTLY_S1_POOL:        ${{ needs.nightly-s1-pool.result }}
          NIGHTLY_S1_DIRECT:      ${{ needs.nightly-s1-direct.result }}
          NIGHTLY_S2:             ${{ needs.nightly-s2-fresh.result }}
          VERIFY_S3:              ${{ needs.nightly-s3.result }}
          VERIFY_S4:              ${{ needs.nightly-verify-s4.result }}
          NIGHTLY_S5:             ${{ needs.nightly-s5.result }}
          NIGHTLY_S6:             ${{ needs.nightly-s6.result }}
          NIGHTLY_S7:             ${{ needs.nightly-s7.result }}
          NIGHTLY_S8:             ${{ needs.nightly-s8.result }}
          NIGHTLY_S9:             ${{ needs.nightly-s9.result }}
          NIGHTLY_S_GRANDPA_REUPLOAD: ${{ needs.nightly-s-grandpa-reupload.result }}
          NIGHTLY_S_MORTALITY:    ${{ needs.nightly-s-mortality.result }}
          NIGHTLY_S_REPROVE:      ${{ needs.nightly-s-reprove.result }}
          NIGHTLY_S_CAR:          ${{ needs.nightly-s-car.result }}
          NIGHTLY_S_INC:          ${{ needs.nightly-s-inc.result }}
          NIGHTLY_S_EXT_SIGNER:   ${{ needs.nightly-s-ext-signer.result }}
          NIGHTLY_TELEMETRY:      ${{ needs.nightly-verify-telemetry.result }}
          NIGHTLY_POOL_DIST:      ${{ needs.nightly-verify-pool-distribution.result }}
          NIGHTLY_PR_COVERAGE:    ${{ needs.nightly-pr-coverage.result }}
          NIGHTLY_CODE_PATH:      ${{ needs.nightly-code-path-coverage.result }}
          TAG:                    ${{ needs.build-nightly.outputs.deploy-tag }}
          VERSION:                ${{ needs.build-nightly.outputs.test-version }}
          RUN_URL:                ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SELECTED_ENV:           ${{ needs.select-env.outputs.selected_env }}
          HEALTHY_ENVS:           ${{ needs.select-env.outputs.healthy_envs }}
        run: |
          emoji() { case "$1" in
            success)   echo "✅ PASS";;
            failure)   echo "❌ FAIL";;
            skipped)   echo "⏭️ SKIP";;
            cancelled) echo "🚫 CANCEL";;
            *)         echo "❓ $1";;
          esac; }

          VERSION_LABEL="${VERSION:-latest stable}"
          case "$TAG" in
            e2e-ci-release)  TITLE="Release E2E Test Pass · \`$VERSION_LABEL\`";;
            e2e-ci-dispatch) TITLE="Dispatched E2E Test Pass · \`$VERSION_LABEL\`";;
            *)               TITLE="Nightly E2E Test Pass · \`$VERSION_LABEL\`";;
          esac

          # Rendered once and reused for the step summary AND the failure-issue
          # body, so both surfaces show the same per-leg table.
          {
            echo "# $TITLE"
            echo ""
            echo "Tag: \`$TAG\` · Run: [${{ github.run_id }}]($RUN_URL)"
            echo ""
            # Show which envs the nightly ran on
            HEALTHY_LIST=$(echo "$HEALTHY_ENVS" | python3 -c "import json,sys; envs=json.load(sys.stdin); print(', '.join(envs))" 2>/dev/null || echo "$HEALTHY_ENVS")
            echo "Environments: $HEALTHY_LIST | Fixed scenarios (S-INC, PR-coverage) on: $SELECTED_ENV"
            echo ""
            echo "## Aggregate results"
            echo ""
            echo "| Scenario | Result |"
            echo "|----------|--------|"
            echo "| S1 pool shard (4 legs) | $(emoji "$NIGHTLY_S1_POOL") |"
            echo "| S1 direct shard (4 legs) | $(emoji "$NIGHTLY_S1_DIRECT") |"
            echo "| S2 fresh (pool + direct) | $(emoji "$NIGHTLY_S2") |"
            echo "| S3 owned-elsewhere | $(emoji "$VERIFY_S3") |"
            echo "| S4 gh-pages mirror | $(emoji "$VERIFY_S4") |"
            echo "| S5 commit-reveal race + retry | $(emoji "$NIGHTLY_S5") |"
            echo "| S6 RPC failover | $(emoji "$NIGHTLY_S6") |"
            echo "| S7 SIGINT crash-capture | $(emoji "$NIGHTLY_S7") |"
            echo "| S8 WS fault injection | $(emoji "$NIGHTLY_S8") |"
            echo "| S9 parallel nonce-collision resilience | $(emoji "$NIGHTLY_S9") |"
            echo "| S-GRANDPA-REUPLOAD stale finalized head | $(emoji "$NIGHTLY_S_GRANDPA_REUPLOAD") |"
            echo "| S-MORTALITY chunk tx mortal era expiry retry | $(emoji "$NIGHTLY_S_MORTALITY") |"
            echo "| S-REPROVE auto-reprove stale alias | $(emoji "$NIGHTLY_S_REPROVE") |"
            echo "| S-CAR --input-car deploy | $(emoji "$NIGHTLY_S_CAR") |"
            echo "| S-INC scenarios (5 legs: s-inc js/kubo, roundtrip, portability, asset-rotation) | $(emoji "$NIGHTLY_S_INC") |"
            echo "| S-ext-signer external PolkadotSigner | $(emoji "$NIGHTLY_S_EXT_SIGNER") |"
            echo "| Telemetry assertions | $(emoji "$NIGHTLY_TELEMETRY") |"
            echo "| Pool selection distribution | $(emoji "$NIGHTLY_POOL_DIST") |"
            echo "| Nightly @ HEAD PR-coverage (11 legs) | $(emoji "$NIGHTLY_PR_COVERAGE") |"
            echo "| Code-path coverage (dead-branch alarm) | $(emoji "$NIGHTLY_CODE_PATH") |"
            echo ""
            echo "## S1 cube — per-leg"
            echo ""
            echo "| Leg | Result |"
            echo "|-----|--------|"
            while IFS=$'\t' read -r name conclusion; do
              echo "| $name | $(emoji "$conclusion") |"
            done < /tmp/s1-legs.tsv
            echo ""
            echo "## S2 fresh — per-leg"
            echo ""
            echo "| Leg | Result |"
            echo "|-----|--------|"
            while IFS=$'\t' read -r name conclusion; do
              echo "| $name | $(emoji "$conclusion") |"
            done < /tmp/s2-legs.tsv
            echo ""
            # Per-env breakdown: extract env ids from job names (suffix in parentheses)
            # and group failing/cancelled legs by env so readers can tell which env hit.
            FAIL_LEGS=$(grep -E $'\tfailure$|\tcancelled$' /tmp/all-nightly-legs.tsv || true)
            if [ -n "$FAIL_LEGS" ]; then
              echo "## Failing legs by env"
              echo ""
              echo "| Leg | Result |"
              echo "|-----|--------|"
              while IFS=$'\t' read -r name conclusion; do
                # Annotate legs without env suffix (S-INC, PR-coverage run on selected_env only)
                case "$name" in
                  *paseo-next-v2*|*preview*|*"telemetry assertions"*|*"pool selection"*|*"code-path"*|*"E2E Report"*)
                    ;;  # already has env info or is a meta-job
                  *)
                    name="$name (on ${SELECTED_ENV})"
                    ;;
                esac
                echo "| $name | $(emoji "$conclusion") |"
              done <<< "$FAIL_LEGS"
              echo ""
            fi
            echo "**Sentry:** [E2E Health dashboard](https://paritytech.sentry.io/dashboard/1732713/?project=4511093597405264) · [raw traces](https://paritytech.sentry.io/explore/traces/?project=4511093597405264&query=deploy.tag%3A$TAG)"
          } > /tmp/report-body.md

          cat /tmp/report-body.md >> "$GITHUB_STEP_SUMMARY"

      # workflow_dispatch runs are manual — skip auto-issue for those (maintainer
      # is already watching). schedule + release get an issue because failures
      # there indicate drift nobody was watching for. `needs.*.result` values
      # of 'failure' or 'cancelled' both indicate a broken run; 'skipped'
      # (e.g. build-nightly failed upstream) also surfaces through build-nightly.
      - name: Open failure issue
        if: >
          (github.event_name == 'schedule' || github.event_name == 'release') &&
          (needs.build-nightly.result == 'failure'
            || needs.nightly-s1-pool.result == 'failure'
            || needs.nightly-s1-direct.result == 'failure'
            || needs.nightly-s2-fresh.result == 'failure'
            || needs.nightly-s3.result == 'failure'
            || needs.nightly-s4.result == 'failure'
            || needs.nightly-verify-s4.result == 'failure'
            || needs.nightly-s5.result == 'failure'
            || needs.nightly-s6.result == 'failure'
            || needs.nightly-s8.result == 'failure'
            || needs.nightly-s9.result == 'failure'
            || needs.nightly-s-grandpa-reupload.result == 'failure'
            || needs.nightly-s-mortality.result == 'failure'
            || needs.nightly-s-reprove.result == 'failure'
            || needs.nightly-s-car.result == 'failure'
            || needs.nightly-s-inc.result == 'failure'
            || needs.nightly-s-ext-signer.result == 'failure'
            || needs.nightly-verify-telemetry.result == 'failure'
            || needs.nightly-verify-pool-distribution.result == 'failure'
            || needs.nightly-pr-coverage.result == 'failure'
            || needs.nightly-code-path-coverage.result == 'failure'
            || needs.build-nightly.result == 'cancelled'
            || needs.nightly-s1-pool.result == 'cancelled'
            || needs.nightly-s1-direct.result == 'cancelled'
            || needs.nightly-s2-fresh.result == 'cancelled'
            || needs.nightly-s3.result == 'cancelled'
            || needs.nightly-s4.result == 'cancelled'
            || needs.nightly-verify-s4.result == 'cancelled'
            || needs.nightly-s5.result == 'cancelled'
            || needs.nightly-s6.result == 'cancelled'
            || needs.nightly-s8.result == 'cancelled'
            || needs.nightly-s9.result == 'cancelled'
            || needs.nightly-s-grandpa-reupload.result == 'cancelled'
            || needs.nightly-s-mortality.result == 'cancelled'
            || needs.nightly-s-reprove.result == 'cancelled'
            || needs.nightly-s-car.result == 'cancelled'
            || needs.nightly-s-inc.result == 'cancelled'
            || needs.nightly-s-ext-signer.result == 'cancelled'
            || needs.nightly-verify-telemetry.result == 'cancelled'
            || needs.nightly-verify-pool-distribution.result == 'cancelled'
            || needs.nightly-pr-coverage.result == 'cancelled'
            || needs.nightly-code-path-coverage.result == 'cancelled')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.build-nightly.outputs.deploy-tag }}
          VERSION: ${{ needs.build-nightly.outputs.test-version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          API_URL: ${{ github.api_url }}
          REPO: ${{ github.repository }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          VERSION_LABEL="${VERSION:-latest stable}"

          case "$TAG" in
            e2e-ci-release)
              TITLE="Release E2E failure: $VERSION_LABEL"
              CONTEXT="Post-release validation failed for \`$VERSION_LABEL\`. The version has already been published to npm; decide whether to yank (\`npm deprecate\`), fix-forward, or investigate before users hit it."
              ;;
            *)
              TITLE="Nightly E2E failure: ${TODAY}"
              CONTEXT="Nightly E2E workflow failed on ${TODAY}."
              ;;
          esac

          # Issue body = context paragraph + the same per-leg table that
          # lands in the Actions step summary + quick-navigation links.
          {
            echo "$CONTEXT"
            echo ""
            cat /tmp/report-body.md
            echo ""
            echo "- Run: $RUN_URL"
            echo "- Summary: $RUN_URL#summary"
          } > /tmp/issue-body.md

          # Use curl (always present on runner) rather than gh CLI, which is
          # absent on ubuntu-latest runners and silently fails with exit 127.
          BODY=$(cat /tmp/issue-body.md)
          curl -fsSL \
            -X POST \
            -H "Authorization: bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$API_URL/repos/$REPO/issues" \
            -d "$(jq -n --arg title "$TITLE" --arg body "$BODY" '{title: $title, body: $body}')"

  # ---- Post-nightly Sentry assertion harness (#181 Proposal 1) -----------

  nightly-verify-telemetry:
    name: Nightly — telemetry assertions
    # Run after the matrix shards whose spans we assert on. S4 is excluded:
    # its spans share the pool domain with S1-pool and would create
    # ambiguous double-counts. S4 correctness is covered by nightly-verify-s4
    # (HTTP endpoint check). `if: always()` so this job runs even when a
    # matrix shard failed — assertion failures are independent of shard results.
    needs: [build-nightly, nightly-s1-pool, nightly-s1-direct, nightly-s2-fresh, nightly-s3]
    if: false  # disabled in public snapshot: telemetry assertions need Parity Sentry (re-enable when a public Sentry is wired)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Assert nightly Sentry telemetry
        env:
          # SENTRY_AUTH_TOKEN must be added as a repo secret by the maintainer.
          # Value: same token as macOS keychain entry "sentry-api-token".
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          DEPLOY_TAG: ${{ needs.build-nightly.outputs.deploy-tag }}
          BULLETIN_DEPLOY_VERSION: ${{ needs.build-nightly.outputs.test-version }}
        run: |
          python3 tools/verify_nightly_telemetry.py \
            --org paritytech \
            --project 4511093597405264 \
            --tag "$DEPLOY_TAG" \
            --version "$BULLETIN_DEPLOY_VERSION" \
            --since 6h \
            --min-spans 4 \
            --poll-interval 60 \
            --max-wait 600

  nightly-verify-pool-distribution:
    name: Nightly — pool selection distribution
    # Guardrail against regressions to randomized pool-account selection
    # (PR #487 added it, #517 unblocked it by removing a quota filter). If a
    # future change re-introduces a filter, a sort, or any other source of
    # skew, the nightly distribution check fails within one cycle.
    # Looks back 24h across all nightly pool-mode deploys; runs even on shard
    # failures since the assertion is independent of any one scenario's
    # success.
    needs: [build-nightly, nightly-s1-pool, nightly-s2-fresh, nightly-s3, nightly-s4, nightly-s5, nightly-s6, nightly-s-inc]
    if: always() && (github.event_name == 'schedule' || github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.test-suite == 'nightly'))
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Assert pool-account selection distribution
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          DEPLOY_TAG: ${{ needs.build-nightly.outputs.deploy-tag }}
        # The verifier exits 2 when the sample is too small to make a
        # meaningful distribution check (the default `--min-spans 10` gate).
        # That's a "skip — not enough data", not a regression, so translate
        # exit 2 → exit 0 here. Real assertion failures (exit 1) still bubble
        # up as a job failure.
        run: |
          set +e
          python3 tools/verify_pool_distribution.py \
            --org paritytech \
            --project 4511093597405264 \
            --tag "$DEPLOY_TAG" \
            --since 24h \
            --min-distinct 5 \
            --max-share 0.40 \
            --min-spans 10
          rc=$?
          set -e
          if [ "$rc" -eq 2 ]; then
            echo "verify_pool_distribution.py: skipped (not enough samples) — passing the job."
            exit 0
          fi
          exit "$rc"

  chain-call-encoding:
    name: Chain-call arg encoding (all extrinsics)
    # No `if:` gate — runs on every trigger (PR / push / schedule / release / dispatch).
    # Cheap (~seconds of read-only metadata fetch); catches arg-type bugs (e.g. a proof
    # passed as a hex string instead of a Binary → papi "Incompatible runtime entry") and
    # chain-side call-signature drift BEFORE the deploy matrix. The chain-free completeness
    # guard also runs in Unit Tests (npm test); this job adds the live-chain encode check.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - name: Assert every extrinsic encodes against the live chain
        run: E2E=1 node --test test/e2e-chain-calls.test.js

  # Authoritative daily drift detector: are the DotNS contract addresses in
  # assets/environments.json still in sync with paritytech/dotns DEPLOYMENTS.md?
  # Stale addresses cause bare-revert (flags=1 data=0x) deploy failures. Runs in
  # the nightly so a drift directly explains a red nightly. (PR-time check lives
  # in .github/workflows/dotns-address-drift.yml.)
  nightly-dotns-address-drift:
    name: Nightly · DotNS address drift
    # Schedule-only (NOT release): drift is an env-config signal orthogonal to the
    # released bytes. Running it on release events could red an RC gating run for
    # an unrelated reason (dotns redeploy mid-cut, expired PAT) → needless rc.N+1.
    if: false  # disabled in public snapshot: address-drift not tracked publicly
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # paritytech/dotns is a private repo — GITHUB_TOKEN can't read it. With the
      # DOTNS_REPO_READ_TOKEN PAT this is the real drift check; without it the
      # tool soft-skips (exit 0) on the fetch failure rather than false-failing.
      - name: Check DotNS contract addresses against DEPLOYMENTS.md
        env:
          GH_TOKEN: ${{ secrets.DOTNS_REPO_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: node tools/check-dotns-contract-addresses.mjs
      - name: Open issue on address drift
        if: failure()
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const title = 'DotNS contract address drift detected';
            const body = [
              'The nightly DotNS address drift check failed.',
              '',
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Addresses in `assets/environments.json` diverge from `DEPLOYMENTS.md` in',
              'paritytech/dotns, or its format changed and the parser needs updating.',
              'Refresh from https://github.com/paritytech/dotns/blob/master/DEPLOYMENTS.md',
            ].join('\n');
            const q = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open "${title}"`;
            const existing = await github.rest.search.issuesAndPullRequests({ q, per_page: 1 });
            if (existing.data.items.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data.items[0].number,
                body: `Still drifting.\n\nRun: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
              return;
            }
            await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });

  nightly-code-path-coverage:
    name: Nightly · Code-path coverage
    if: false  # disabled in public snapshot: code-path coverage needs Parity Sentry
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check dead-branch coverage in Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: python3 tools/check-code-path-coverage.py
      - name: Open issue on dead paths
        if: failure()
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const title = 'Dead code path — zero production hits in 30 days';
            const body = [
              'The nightly code-path coverage check found a branch with zero Sentry hits.',
              '',
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Check the run log for which `code.path` IDs had zero hits.',
              'Options: delete the branch, fix the condition routing to it, or remove',
              'from `CODE_PATHS` in `src/code-paths.ts` if dormant by design.',
            ].join('\n');
            const q = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open "${title}"`;
            const existing = await github.rest.search.issuesAndPullRequests({ q, per_page: 1 });
            if (existing.data.items.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data.items[0].number,
                body: `Still dead.\n\nRun: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title, body,
              labels: ['observability'],
            });
