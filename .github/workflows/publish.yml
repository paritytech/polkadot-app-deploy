name: Publish to npm

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    # Maintainer-triggered: fires on `release: created`, which only repo
    # maintainers can do. `release` is a protected environment with required
    # reviewers (a maintainer + the builder-experience team), so a publish
    # needs an explicit human approval click before this job runs.
    environment: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - run: npm ci

      # Full offline suite (test/test.js etc.) — builds internally
      # (npm test → npm run build → node --test). The public package ships with
      # NO Sentry DSN: telemetry is strictly opt-in and inert by default. Do NOT
      # add a SENTRY_DSN secret to this repo — leaving it unset is the design.
      - run: npm test

      # The package is published to the @parity scope through Parity's
      # `npm_publish_automation` — this repo never holds an npm token. We build
      # the tarball, upload it as an artifact, and dispatch to the automation,
      # which downloads the artifact (via its org token), re-checks the packed
      # name against its allowlist, and runs `npm publish` with the @parity
      # credentials. Same flow bulletin-deploy uses for @parity/product-deploy.
      - name: Determine npm dist-tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "npm_tag=rc" >> "$GITHUB_OUTPUT"   # pre-release → @rc, @latest untouched
          else
            echo "npm_tag=" >> "$GITHUB_OUTPUT"      # stable → @latest
          fi

      - name: Pack @parity/polkadot-app-deploy
        run: npm pack

      - uses: actions/upload-artifact@v4
        with:
          name: polkadot-app-deploy
          path: "*.tgz"

      - name: Dispatch to npm_publish_automation
        uses: octokit/request-action@v2.x
        with:
          route: POST /repos/paritytech/npm_publish_automation/actions/workflows/publish.yml/dispatches
          ref: main
          inputs: '${{ format(''{{ "repo": "{0}", "run_id": "{1}", "npm_tag": "{2}", "artifact_name": "polkadot-app-deploy" }}'', github.repository, github.run_id, steps.tag.outputs.npm_tag) }}'
        env:
          GITHUB_TOKEN: ${{ secrets.NPM_PUBLISH_AUTOMATION_TOKEN }}
