      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: paritytech/polkadot-app-deploy
          ref: ${{ env.BULLETIN_DEPLOY_REF || '' }}
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - name: Build polkadot-app-deploy from source
        if: env.BULLETIN_DEPLOY_REF != ''
        run: |
          SKIP_ENVIRONMENTS_PREFETCH=1 npm ci
      - name: Install polkadot-app-deploy from npm
        if: env.BULLETIN_DEPLOY_REF == ''
        run: |
          V="${BULLETIN_DEPLOY_VERSION:-latest}"
          # ws is a devDep needed by test/helpers/ws-fault-proxy.mjs; not in the published package
          npm install --no-save "@parity/polkadot-app-deploy@${V}" ws
          # e2e.test.js resolves imports from ../dist — symlink the installed dist so
          # relative imports work on the npm-install path (no local build on this path).
          ln -sf node_modules/@parity/polkadot-app-deploy/dist dist
      - name: Run S8 WS fault-injection scenario (one retry on transient testnet failures)
        uses: nick-fields/retry@v3
        env:
          E2E: "1"
          E2E_SCENARIO: s8
          E2E_SIGNER: direct
          E2E_MERKLE: js
          PAD_ENV: ${{ matrix.env }}
          # 512 MB cap is scoped to the test step only: S8 exercises memory-pressure
          # behaviour in the polkadot-app-deploy CLI under WS fault injection. At job-level
          # this leaked into `npm ci`'s prepare hook and OOM'd tsup's DTS worker (see
          # v0.7.22-rc.0 E2E run 25999954143).
          NODE_OPTIONS: --max-old-space-size=512
          # Unique fixture label per run so concurrent retries don't collide.
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
        with:
          timeout_minutes: 20
          max_attempts: 2
          retry_wait_seconds: 30
          retry_on_exit_code: 75
          command: node tools/release-retry-wrapper.mjs node --test test/e2e.test.js

